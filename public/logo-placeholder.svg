<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" fill="none">
  <!-- Yin-Yang correto: metade esquerda verde, metade direita branca -->
  <circle cx="36" cy="36" r="32" fill="#1E6F30"/>
  <!-- Metade direita branca -->
  <path d="M36 4 A32 32 0 0 1 36 68 A16 16 0 0 0 36 36 A16 16 0 0 1 36 4Z" fill="#fff"/>
  <!-- Círculo branco pequeno no lado verde (superior) -->
  <circle cx="36" cy="20" r="6" fill="#fff"/>
  <!-- Círculo verde pequeno no lado branco (inferior) -->
  <circle cx="36" cy="52" r="6" fill="#1E6F30"/>
  <!-- Borda sutil -->
  <circle cx="36" cy="36" r="32" fill="none" stroke="#98BE98" stroke-width="1"/>

  <!-- Nome -->
  <text x="80" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#1E6F30" font-style="italic" font-weight="700">Sandrä Costa</text>
  <!-- Subtítulo -->
  <text x="81" y="50" font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="#6CC24A" letter-spacing="3.5" font-weight="600">TERAPEUTA HOLÍSTICA</text>
</svg>
